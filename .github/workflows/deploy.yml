name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -p -P "${{ secrets.SSH_PASSPHRASE }}" -N "" -f ~/.ssh/id_rsa

      - name: Deploy via lftp SFTP
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.FTP_HOST }}
        run: |
          sudo apt-get install -y lftp
          printf '%s\n' \
            'set sftp:connect-program "ssh -a -x -i /home/runner/.ssh/id_rsa -p 21098 -o StrictHostKeyChecking=no"' \
            'set net:timeout 30' \
            "open sftp://${SSH_USER}@${SSH_HOST}" \
            'mirror --reverse --delete --verbose --exclude-glob .git --exclude-glob .github --exclude-glob .vscode . /home/elkhjobe/public_html/' \
            'quit' > /tmp/deploy.lftp
          cat /tmp/deploy.lftp
          lftp -f /tmp/deploy.lftp
