name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -p -P "${{ secrets.SSH_PASSPHRASE }}" -N "" -f ~/.ssh/id_rsa

      - name: Deploy via Python SFTP
        env:
          SSH_HOST: ${{ secrets.FTP_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          pip install paramiko --quiet
          python3 << 'PYEOF'
import paramiko, os, sys

EXCLUDE = {'.git', '.github', '.vscode'}
REMOTE_BASE = '/home/elkhjobe/public_html'
KEY_PATH = os.path.expanduser('~/.ssh/id_rsa')
HOST = os.environ['SSH_HOST']
USER = os.environ['SSH_USER']

def upload_dir(sftp, local_dir, remote_dir):
    try:
        sftp.stat(remote_dir)
    except FileNotFoundError:
        sftp.mkdir(remote_dir)
    for item in os.listdir(local_dir):
        if item in EXCLUDE:
            continue
        lp = os.path.join(local_dir, item)
        rp = f"{remote_dir}/{item}"
        if os.path.isdir(lp):
            upload_dir(sftp, lp, rp)
        else:
            print(f"  -> {rp}")
            sftp.put(lp, rp)

key = paramiko.RSAKey.from_private_key_file(KEY_PATH)
client = paramiko.SSHClient()
client.set_missing_host_key_policy(paramiko.AutoAddPolicy())
client.connect(HOST, port=21098, username=USER, pkey=key, timeout=30)
sftp = client.open_sftp()

print(f"Connected. Uploading to {REMOTE_BASE} ...")
upload_dir(sftp, '.', REMOTE_BASE)

sftp.close()
client.close()
print("Done!")
PYEOF
