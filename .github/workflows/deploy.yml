name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -p -P "${{ secrets.SSH_PASSPHRASE }}" -N "" -f ~/.ssh/id_rsa

      - name: Deploy via Python SFTP
        env:
          SSH_HOST: ${{ secrets.FTP_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          pip install paramiko --quiet
          python3 .github/scripts/deploy.py
